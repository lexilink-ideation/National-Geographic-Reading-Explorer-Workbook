<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lexilink Reading Explorer Practice Hub</title>
  <style>
    :root {
      --ink: #21302c;
      --muted: #65736e;
      --bg: #eef5ef;
      --paper: #fffdf7;
      --card: #ffffff;
      --green: #29483a;
      --leaf: #d8ead7;
      --gold: #f3c94b;
      --line: #d9e2dc;
      --shadow: rgba(35, 48, 45, 0.09);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #eef5ef 0%, #fffdf7 58%, #f7f1df 100%);
      line-height: 1.55;
    }

    header {
      background: var(--green);
      color: white;
      padding: 28px 18px 30px;
    }

    .wrap {
      width: min(1080px, 100%);
      margin: 0 auto;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
    }

    .brand img {
      width: 48px;
      height: 56px;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
      flex: 0 0 auto;
    }

    .brand-text {
      display: grid;
      gap: 2px;
      line-height: 1.05;
      text-transform: uppercase;
    }

    .brand-text strong {
      font-size: 17px;
      font-weight: 900;
    }

    .brand-text span {
      font-size: 12px;
      color: #dfeee5;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 6vw, 56px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: #e7f1e8;
      font-size: 17px;
      max-width: 720px;
    }

    main {
      padding: 18px;
    }

    .controls {
      margin: -32px auto 18px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 12px 28px var(--shadow);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px;
      gap: 12px;
      align-items: center;
    }

    input, select {
      width: 100%;
      min-height: 44px;
      border: 1px solid #b9c8bf;
      border-radius: 8px;
      padding: 10px 12px;
      font: inherit;
      color: var(--ink);
      background: white;
    }

    .stats {
      margin: 8px 0 16px;
      color: var(--muted);
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .card {
      min-height: 260px;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      box-shadow: 0 10px 28px var(--shadow);
      overflow: hidden;
    }

    .card-top {
      padding: 14px 14px 10px;
      background: var(--paper);
      border-bottom: 1px solid var(--line);
    }

    .badge-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border-radius: 999px;
      background: var(--leaf);
      color: #264c39;
      font-size: 13px;
      font-weight: 800;
    }

    .badge.status {
      background: var(--gold);
      color: #4d3e0e;
    }

    h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .theme {
      margin: 6px 0 0;
      color: var(--muted);
      font-weight: 700;
    }

    .card-body {
      padding: 14px;
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 12px;
    }

    .description {
      margin: 0;
      color: #40504b;
    }

    .links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: auto;
    }

    a.button {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      padding: 9px 10px;
      background: var(--green);
      color: white;
      text-decoration: none;
      font-weight: 800;
      text-align: center;
    }

    a.button.secondary {
      background: var(--leaf);
      color: #254836;
    }

    .empty {
      display: none;
      padding: 28px;
      border: 1px dashed #b9c8bf;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.7);
      color: var(--muted);
      text-align: center;
      font-weight: 700;
    }

    footer {
      padding: 24px 18px 34px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      header { padding-top: 22px; }
      main { padding-left: 12px; padding-right: 12px; }
      .controls {
        grid-template-columns: 1fr;
        margin-top: -24px;
      }
      .grid { grid-template-columns: 1fr; }
      .links { grid-template-columns: 1fr; }
    }

    @media print {
      body { background: white; }
      header { color: var(--ink); background: white; border-bottom: 1px solid var(--line); }
      .subtitle, footer, .controls { display: none; }
      .card { box-shadow: none; break-inside: avoid; }
      a.button { border: 1px solid var(--line); color: var(--ink); background: white; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="brand" aria-label="Lexilink Ideation IELTS Studio">
        <img src="lexilink-logo.png" alt="">
        <div class="brand-text">
          <strong>LEXILINK IDEATION</strong>
          <span>IELTS Studio</span>
        </div>
      </div>
      <h1>Reading Explorer Practice Hub</h1>
      <p class="subtitle">Interactive unit workbooks, lesson notes, and parent reports.</p>
    </div>
  </header>

  <main class="wrap">
    <div class="controls">
      <input id="search" type="search" placeholder="Search unit, title, theme, vocabulary">
      <select id="levelFilter" aria-label="Filter by level">
        <option value="">All levels</option>
      </select>
    </div>

    <div class="stats" id="stats"></div>
    <div class="grid" id="unitGrid"></div>
    <div class="empty" id="empty">No matching units.</div>
  </main>

  <footer>
    LEXILINK IDEATION IELTS Studio
  </footer>

  <script>
    const fallbackUnits = [
      {
        id: "re-unit-6a",
        series: "Reading Explorer",
        level: "",
        unit: "6A",
        theme: "Plants and Trees",
        title: "Planting for the Planet",
        description: "Felix Finkbeiner, climate change, deforestation, and tree planting.",
        workbook: "workbook.html",
        notes: "lesson_notes.md",
        report: "parent_report.md",
        source: "6A-1.pdf",
        status: "Ready"
      }
    ];

    let units = fallbackUnits;

    const grid = document.getElementById("unitGrid");
    const stats = document.getElementById("stats");
    const search = document.getElementById("search");
    const levelFilter = document.getElementById("levelFilter");
    const empty = document.getElementById("empty");

    function clean(value) {
      return String(value || "").trim();
    }

    function levelLabel(unit) {
      return clean(unit.level) ? "Level " + clean(unit.level) : "Level TBA";
    }

    function unitText(unit) {
      return [
        unit.series,
        unit.level,
        unit.unit,
        unit.theme,
        unit.title,
        unit.description,
        unit.status
      ].map(clean).join(" ").toLowerCase();
    }

    function populateLevels() {
      const levels = [...new Set(units.map(unit => clean(unit.level)).filter(Boolean))].sort();
      levelFilter.innerHTML = '<option value="">All levels</option>' + levels.map(level => {
        return '<option value="' + level + '">Level ' + level + '</option>';
      }).join("");
    }

    function linkButton(href, label, secondary) {
      if (!clean(href)) return "";
      return '<a class="button' + (secondary ? ' secondary' : '') + '" href="' + href + '">' + label + '</a>';
    }

    function render() {
      const query = search.value.trim().toLowerCase();
      const selectedLevel = levelFilter.value;
      const filtered = units.filter(unit => {
        const matchesSearch = !query || unitText(unit).includes(query);
        const matchesLevel = !selectedLevel || clean(unit.level) === selectedLevel;
        return matchesSearch && matchesLevel;
      });

      grid.innerHTML = filtered.map(unit => {
        return `
          <article class="card">
            <div class="card-top">
              <div class="badge-row">
                <span class="badge">${clean(unit.series) || "Reading Explorer"}</span>
                <span class="badge">${levelLabel(unit)}</span>
                <span class="badge">Unit ${clean(unit.unit) || "TBA"}</span>
                <span class="badge status">${clean(unit.status) || "Ready"}</span>
              </div>
              <h2>${clean(unit.title) || "Untitled Unit"}</h2>
              <p class="theme">${clean(unit.theme) || "Theme TBA"}</p>
            </div>
            <div class="card-body">
              <p class="description">${clean(unit.description) || "Workbook practice is ready."}</p>
              <div class="links">
                ${linkButton(unit.workbook, "Workbook", false)}
                ${linkButton(unit.source, "Source PDF", true)}
              </div>
            </div>
          </article>
        `;
      }).join("");

      stats.textContent = filtered.length + " unit" + (filtered.length === 1 ? "" : "s") + " available";
      empty.style.display = filtered.length ? "none" : "block";
    }

    async function loadCatalog() {
      try {
        const response = await fetch("units.json", { cache: "no-store" });
        if (response.ok) {
          const data = await response.json();
          if (Array.isArray(data) && data.length) units = data;
        }
      } catch (error) {
        units = fallbackUnits;
      }
      populateLevels();
      render();
    }

    search.addEventListener("input", render);
    levelFilter.addEventListener("change", render);
    loadCatalog();
  </script>
</body>
</html>
